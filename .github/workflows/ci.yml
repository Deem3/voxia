name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies (Tauri + Whisper)
        run: |
          chmod +x scripts/ci-install-linux-deps.sh
          ./scripts/ci-install-linux-deps.sh
      - name: Prepare FFmpeg sidecar
        run: |
          chmod +x scripts/ci-prepare-ffmpeg.sh scripts/prepare-ffmpeg-sidecar.sh
          ./scripts/ci-prepare-ffmpeg.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
