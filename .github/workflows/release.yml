name: Release

# GitHub does NOT run workflows triggered by GITHUB_TOKEN (release-please's default).
# Use secret RELEASE_PLEASE_TOKEN (PAT) for release-please, OR re-run this workflow manually.
on:
  push:
    tags:
      - "voxia-v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. voxia-v0.2.0 — must match GitHub tag exactly)"
        required: true
permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-versions:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      # Tags like voxia-v0.2.0 are not branches — checkout needs refs/tags/... (not refs/heads/...).
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.release.tag_name || github.event.inputs.tag) }}
          fetch-depth: 0
      - run: chmod +x scripts/verify-versions.sh && ./scripts/verify-versions.sh

  build-tauri:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: verify-versions
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.release.tag_name || github.event.inputs.tag) }}
          fetch-depth: 0

      - name: Require updater signing secret
        shell: bash
        run: |
          if [[ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]]; then
            echo "::error::Missing repository secret TAURI_SIGNING_PRIVATE_KEY. Builds with createUpdaterArtifacts need it."
            exit 1
          fi

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          chmod +x scripts/ci-install-linux-deps.sh
          ./scripts/ci-install-linux-deps.sh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Prepare FFmpeg sidecar
        shell: bash
        run: |
          chmod +x scripts/ci-prepare-ffmpeg.sh scripts/prepare-ffmpeg-sidecar.sh
          ./scripts/ci-prepare-ffmpeg.sh

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
          releaseName: "voxia ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
          includeUpdaterArtifacts: true
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
